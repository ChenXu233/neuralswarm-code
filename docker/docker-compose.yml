# NeuralSwarm v2.0 Docker Compose
#
# 神经元节点部署：
#   user-neuron    → 内核 + UI，对外提供 Web 界面
#   compute-neuron → 仅内核，无 UI，纯计算节点
#
# 用法：
#   启动用户神经元：     docker compose up -d user-neuron
#   启动计算神经元：     docker compose up -d compute-neuron
#   开发模式（前端热更）：docker compose --profile dev up -d

name: neuralswarm

services:
  # ── 用户神经元 ──────────────────────────────
  # 内核 + 内置 UI，浏览器访问 http://host:8000
  user-neuron:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: user
    ports:
      - "${NS_PORT:-8000}:8000"
    environment:
      NS_PORT: ${NS_PORT:-8000}
      NS_DATA_DIR: /data
      NS_UI_DIR: /app/ui
      NS_LOG: ${NS_LOG:-info}
      NS_LLM_ENDPOINT: ${NS_LLM_ENDPOINT:-}
      NS_LLM_API_KEY: ${NS_LLM_API_KEY:-}
      NS_LLM_MODEL: ${NS_LLM_MODEL:-}
      # P2P 发现
      NS_PEER_PORT: ${NS_PEER_PORT:-9090}
      NS_BOOTSTRAP: ${NS_BOOTSTRAP:-}
    volumes:
      - neuralswarm_data:/data
    restart: unless-stopped

  # ── 计算神经元 ──────────────────────────────
  # 仅内核，无 UI，适合做 GPU 计算节点或远程执行节点
  compute-neuron:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: compute
    ports:
      - "${NS_COMPUTE_PORT:-8001}:8000"
    environment:
      NS_PORT: 8000
      NS_DATA_DIR: /data
      NS_LOG: ${NS_LOG:-info}
      NS_LLM_ENDPOINT: ${NS_LLM_ENDPOINT:-}
      NS_LLM_API_KEY: ${NS_LLM_API_KEY:-}
      NS_LLM_MODEL: ${NS_LLM_MODEL:-}
      NS_PEER_PORT: ${NS_COMPUTE_PEER_PORT:-9091}
      NS_BOOTSTRAP: ${NS_BOOTSTRAP:-}
    volumes:
      - neuralswarm_compute_data:/data
    restart: unless-stopped

  # ── 开发模式 ────────────────────────────────
  # 内核在容器中，前端在宿主机通过 Vite 热重载
  kernel-dev:
    profiles: ["dev"]
    image: rust:1.80-alpine
    working_dir: /app
    ports:
      - "${NS_PORT:-8000}:8000"
    environment:
      NS_PORT: 8000
      NS_DATA_DIR: /data
      NS_LOG: debug
    volumes:
      - ../kernel:/app
      - neuralswarm_dev_data:/data
    command: >
      sh -c "apk add --no-cache musl-dev protobuf-dev &&
             cargo install cargo-watch 2>/dev/null &&
             cargo watch -x run"
    restart: unless-stopped

volumes:
  neuralswarm_data:
  neuralswarm_compute_data:
  neuralswarm_dev_data:
