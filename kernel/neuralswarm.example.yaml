# NeuralSwarm Kernel 配置示例
# 复制为 neuralswarm.yaml 并按需修改

node:
  name: "my-node"
  port: 8080

workspace:
  mounts:
    - name: project
      path: "."

llm:
  # API 端点（OpenAI 兼容）
  api_base: "https://api.openai.com/v1"
  # API 密钥，支持 ${ENV_VAR} 语法引用环境变量
  api_key: "${LLM_API_KEY}"
  # 模型名称
  model: "gpt-4o-mini"
  # Agent 循环最大迭代次数（防止死循环）
  max_iterations: 25
  # 可选：全局 system prompt
  system_prompt: "You are a helpful coding assistant."

tools:
  shell:
    enabled: true
