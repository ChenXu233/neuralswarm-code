name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Python 服务器测试
  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd server
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: |
          cd server
          ruff check .

      - name: Run tests
        run: |
          cd server
          pytest

  # 客户端构建检查
  client-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Type check
        run: |
          cd client
          npx vue-tsc --noEmit

      - name: Build
        run: |
          cd client
          npm run build
