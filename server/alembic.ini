# server/alembic.ini

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
# file_template uses Alembic's own template syntax; ConfigParser's
# interpolation conflicts with it, so we leave it at the default.

# version number format
# version_num_format uses Alembic template syntax; left at default.

# version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses
# os.pathsep. If this key is omitted entirely, it falls back to the legacy
# behavior of splitting on spaces and/or commas. However, in alembic 1.10.0 and
# later, the default is "os", which is forward-compatible and is recommended.
# version_path_separator = :

# set to 'true' to allow sourceless upgrades down to the target
# version
# downgrade_omit_empty_rev = false

# the output encoding used when revision files
# are written from script.py.mako
output_encoding = utf-8

# This is the URL of the database. It will be overridden by env.py
# which reads from neuralswarm.config.settings.
# Use a placeholder that does not trigger ConfigParser interpolation.
sqlalchemy.url =

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# lint with attempts to fix using "ruff" - use the exec runner, execute a binary
# hooks = ruff
# ruff.type = exec
# ruff.executable = ${ruff_executable}
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# lint with "mypy" - use the exec runner, execute a binary
# hooks = mypy
# mypy.type = exec
# mypy.executable = ${mypy_executable}
# mypy.options = REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
