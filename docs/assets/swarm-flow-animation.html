<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralSwarm — Swarm Flow 动画</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1A1512;
            --surface: #231E1A;
            --text: #F0E8DE;
            --text-dim: #A09080;
            --accent: #E8A040;
            --accent-glow: rgba(232, 160, 64, 0.18);
            --path-color: rgba(240, 232, 222, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .glow-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(232,160,64,0.08) 0%, transparent 70%);
            top: 35%; left: 60%;
            transform: translate(-50%, -50%);
        }

        /* Main container */
        .main {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        /* Logo stage */
        .logo-stage {
            position: relative;
            width: min(70vw, 70vh, 400px);
            height: min(70vw, 70vh, 400px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swarm-logo {
            width: 100%;
            height: 100%;
        }

        /* Guiding path (static subtle line) */
        .guide-path {
            stroke: var(--path-color);
            stroke-width: 0.8;
            stroke-dasharray: 3 6;
            fill: none;
        }

        /* Capsule styling */
        .capsule {
            fill: var(--accent);
            opacity: 0.85;
        }
        .capsule-trail {
            fill: var(--accent);
        }

        /* Info section */
        .info {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }
        .product-name {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        .product-tagline {
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        .variant-label {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid rgba(232,160,64,0.25);
            padding: 0.35rem 1rem;
            border-radius: 100px;
            margin-top: 0.25rem;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .control-btn {
            background: var(--surface);
            border: 1px solid rgba(240,232,222,0.1);
            color: var(--text-dim);
            padding: 0.5rem 1.25rem;
            border-radius: 100px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            transition: all 0.3s ease;
            user-select: none;
        }
        .control-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .control-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .speed-slider {
            -webkit-appearance: none;
            width: 100px;
            height: 2px;
            background: rgba(240,232,222,0.15);
            border-radius: 2px;
            outline: none;
        }
        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .speed-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            opacity: 0.4;
            z-index: 1;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .logo-stage {
                width: 75vw;
                height: 75vw;
            }
            .product-name {
                font-size: 1.6rem;
            }
            .controls {
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="main">
        <!-- Logo Stage -->
        <div class="logo-stage">
            <svg class="swarm-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- The S-curve flow path -->
                    <path id="flow-path" d="M 12 78 Q 32 62, 50 50 T 88 24"/>

                    <!-- Subtle glow filter -->
                    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="0.8" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Guiding path (faint) -->
                <path d="M 12 78 Q 32 62, 50 50 T 88 24" class="guide-path"/>

                <!--
                12 capsules flowing along the path.
                Sizes peak at center of path, taper at edges.
                Evenly staggered by -0.3s each (3.6s total cycle).
                -->
                <g filter="url(#glow)">
                    <!-- Position 1: path start, small -->
                    <rect x="-4" y="-1.8" width="8" height="3.6" rx="1.8" class="capsule" style="opacity:0.45">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="0s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 2 -->
                    <rect x="-4.5" y="-2" width="9" height="4" rx="2" class="capsule" style="opacity:0.55">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-0.3s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 3 -->
                    <rect x="-5" y="-2.3" width="10" height="4.6" rx="2.3" class="capsule" style="opacity:0.65">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-0.6s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 4 -->
                    <rect x="-6" y="-2.7" width="12" height="5.4" rx="2.7" class="capsule" style="opacity:0.75">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-0.9s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 5: center region, largest -->
                    <rect x="-7" y="-3" width="14" height="6" rx="3" class="capsule" style="opacity:0.9">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-1.2s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 6: center region -->
                    <rect x="-7" y="-3" width="14" height="6" rx="3" class="capsule" style="opacity:0.9">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-1.5s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 7 -->
                    <rect x="-6.5" y="-2.8" width="13" height="5.6" rx="2.8" class="capsule" style="opacity:0.8">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-1.8s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 8 -->
                    <rect x="-5.5" y="-2.5" width="11" height="5" rx="2.5" class="capsule" style="opacity:0.7">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-2.1s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 9 -->
                    <rect x="-5" y="-2.2" width="10" height="4.4" rx="2.2" class="capsule" style="opacity:0.58">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-2.4s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 10 -->
                    <rect x="-4.5" y="-2" width="9" height="4" rx="2" class="capsule" style="opacity:0.48">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-2.7s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 11 -->
                    <rect x="-4" y="-1.7" width="8" height="3.4" rx="1.7" class="capsule" style="opacity:0.38">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-3.0s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>

                    <!-- Position 12: path end, smallest -->
                    <rect x="-3.5" y="-1.5" width="7" height="3" rx="1.5" class="capsule" style="opacity:0.28">
                        <animateMotion dur="3.6s" repeatCount="indefinite" begin="-3.3s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                    </rect>
                </g>

                <!-- Leading dot (at path end) -->
                <circle cx="0" cy="0" r="2.5" fill="var(--accent)" style="opacity:0.9">
                    <animateMotion dur="3.6s" repeatCount="indefinite" begin="-1.1s" rotate="auto">
                        <mpath href="#flow-path"/>
                    </animateMotion>
                    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
                </circle>

                <!-- Trailing dots near path start -->
                <circle cx="0" cy="0" r="1.2" fill="var(--accent)" style="opacity:0.3">
                    <animateMotion dur="3.6s" repeatCount="indefinite" begin="0.1s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                </circle>
                <circle cx="0" cy="0" r="1" fill="var(--accent)" style="opacity:0.2">
                    <animateMotion dur="3.6s" repeatCount="indefinite" begin="0.25s" rotate="auto"><mpath href="#flow-path"/></animateMotion>
                </circle>
            </svg>
        </div>

        <!-- Info -->
        <div class="info">
            <h1 class="product-name">NeuralSwarm</h1>
            <p class="product-tagline">异构多智能体 Mesh 调度系统</p>
            <span class="variant-label">Swarm Flow · 群蜂流动</span>
        </div>

        <!-- Controls -->
        <div class="controls">
            <span class="speed-label">流速</span>
            <input type="range" class="speed-slider" id="speed" min="0.5" max="3" step="0.25" value="1">
            <span class="speed-label" id="speed-val">1×</span>
            <button class="control-btn active" data-theme="warm">暖金</button>
            <button class="control-btn" data-theme="mono">黑白</button>
            <button class="control-btn" data-theme="cool">冷蓝</button>
        </div>
    </div>

    <div class="footer">SWARM FLOW · LOGO ANIMATION · NEURALSWARM 2026</div>

    <script>
        // Speed control
        const slider = document.getElementById('speed');
        const speedVal = document.getElementById('speed-val');
        const logo = document.querySelector('.swarm-logo');

        slider.addEventListener('input', () => {
            const val = parseFloat(slider.value);
            speedVal.textContent = val.toFixed(2) + '×';
            // Adjust animation speed by changing the SVG's time scale
            // We do this by pausing all animations and restarting with adjusted playbackRate
            const anims = logo.querySelectorAll('animateMotion, animate');
            anims.forEach(a => {
                // Set a CSS custom property to control speed
            });
            logo.style.setProperty('--speed', val);
            // Set animationDuration via style since we can't directly change SVG anim speed
            // Alternative: use document timeline playbackRate
            const svgDoc = logo.querySelector('animateMotion');
            // Re-apply speed by toggling a data attribute and using CSS
            logo.setAttribute('data-speed', val);
        });

        // Speed control via CSS approach
        // Since SVG animateMotion doesn't easily support speed changes,
        // we modify a <style> element with the adjusted durations
        const speedStyle = document.createElement('style');
        document.head.appendChild(speedStyle);

        function updateSpeed(factor) {
            const baseDur = 3.6 / factor;
            const steps = baseDur / 12;
            let css = '';
            const rects = logo.querySelectorAll('rect.capsule, rect[class*="capsule"]');
            // Actually let's use a different approach - rebuild the animation durations
            // Since animateMotion doesn't respond to CSS, we need to modify the SVG attributes
            const allAnimateMotion = logo.querySelectorAll('animateMotion');
            allAnimateMotion.forEach((am, i) => {
                am.setAttribute('dur', baseDur + 's');
            });
            const allAnimate = logo.querySelectorAll('animate');
            allAnimate.forEach(a => {
                // Don't change pulse duration
            });
        }

        slider.addEventListener('input', () => {
            const factor = parseFloat(slider.value);
            speedVal.textContent = factor.toFixed(2) + '×';
            updateSpeed(factor);
        });

        // Theme switching
        const root = document.documentElement;
        const themes = {
            warm: {
                '--bg': '#1A1512',
                '--surface': '#231E1A',
                '--text': '#F0E8DE',
                '--text-dim': '#A09080',
                '--accent': '#E8A040',
                '--accent-glow': 'rgba(232, 160, 64, 0.18)',
                '--path-color': 'rgba(240, 232, 222, 0.08)',
            },
            mono: {
                '--bg': '#0D0D0D',
                '--surface': '#1A1A1A',
                '--text': '#F5F5F5',
                '--text-dim': '#888888',
                '--accent': '#FFFFFF',
                '--accent-glow': 'rgba(255, 255, 255, 0.12)',
                '--path-color': 'rgba(255, 255, 255, 0.06)',
            },
            cool: {
                '--bg': '#0A0E1A',
                '--surface': '#111827',
                '--text': '#E0E7FF',
                '--text-dim': '#6B7FAD',
                '--accent': '#60A5FA',
                '--accent-glow': 'rgba(96, 165, 250, 0.15)',
                '--path-color': 'rgba(148, 175, 255, 0.07)',
            },
        };

        document.querySelectorAll('.control-btn[data-theme]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.control-btn[data-theme]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const theme = themes[btn.dataset.theme];
                Object.entries(theme).forEach(([key, val]) => {
                    root.style.setProperty(key, val);
                });
            });
        });
    </script>
</body>
</html>
