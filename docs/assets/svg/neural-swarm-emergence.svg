<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Emergence: Intelligence emerging from discrete parts -->
  <!-- Center -->
  <circle cx="50" cy="50" r="4" fill="currentColor"/>
  <!-- Ring 1: 270° arc -->
  <path d="M 50 36 A 14 14 0 1 1 36 50" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Ring 2: three arc segments -->
  <path d="M 50 26 A 24 24 0 0 1 63 38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 37 62 A 24 24 0 0 1 26 50" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 74 50 A 24 24 0 0 1 63 62" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Ring 3: scattered dots -->
  <g fill="currentColor">
    <circle cx="82" cy="50" r="2.5"/><circle cx="78" cy="66" r="2.2"/>
    <circle cx="66" cy="78" r="2"/><circle cx="50" cy="82" r="2.5"/>
    <circle cx="34" cy="78" r="2"/><circle cx="22" cy="66" r="2.2"/>
    <circle cx="18" cy="50" r="2"/><circle cx="50" cy="18" r="2"/>
    <circle cx="58" cy="19" r="1.8"/><circle cx="72" cy="28" r="1.5"/>
  </g>
  <!-- Outer hint ring -->
  <circle cx="50" cy="50" r="35" stroke="currentColor" stroke-width="0.6" stroke-dasharray="1.5 4" opacity="0.2" fill="none"/>
</svg>
