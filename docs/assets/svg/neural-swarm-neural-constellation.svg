<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Neural Constellation: Neural network activation pattern -->
  <!-- Inner ring (8 dots, r=14) -->
  <g fill="currentColor">
    <circle cx="64" cy="50" r="2.8"/><circle cx="59.9" cy="59.9" r="2.8"/>
    <circle cx="50" cy="64" r="2.8"/><circle cx="40.1" cy="59.9" r="2.8"/>
    <circle cx="36" cy="50" r="2.8"/><circle cx="40.1" cy="40.1" r="2.8"/>
    <circle cx="50" cy="36" r="2.8"/><circle cx="59.9" cy="40.1" r="2.8"/>
  </g>
  <!-- Inner connections -->
  <g stroke="currentColor" stroke-width="1.2" opacity="0.5">
    <line x1="64" y1="50" x2="59.9" y2="59.9"/><line x1="59.9" y1="59.9" x2="50" y2="64"/>
    <line x1="50" y1="64" x2="40.1" y2="59.9"/><line x1="40.1" y1="40.1" x2="50" y2="36"/>
    <line x1="50" y1="36" x2="59.9" y2="40.1"/><line x1="50" y1="36" x2="40.1" y2="40.1"/>
    <line x1="40.1" y1="59.9" x2="36" y2="50"/>
  </g>
  <!-- Outer ring (14 dots, r=28) -->
  <g fill="currentColor" opacity="0.65">
    <circle cx="78" cy="50" r="2.2"/><circle cx="75.2" cy="62.2" r="2.2"/>
    <circle cx="67.5" cy="72" r="2.2"/><circle cx="56.2" cy="77.3" r="2.2"/>
    <circle cx="43.8" cy="77.3" r="2.2"/><circle cx="32.5" cy="72" r="2.2"/>
    <circle cx="24.8" cy="62.2" r="2.2"/><circle cx="22" cy="50" r="2.2"/>
    <circle cx="24.8" cy="37.8" r="2.2"/><circle cx="32.5" cy="28" r="2.2"/>
    <circle cx="43.8" cy="22.7" r="2.2"/><circle cx="56.2" cy="22.7" r="2.2"/>
    <circle cx="67.5" cy="28" r="2.2"/><circle cx="75.2" cy="37.8" r="2.2"/>
  </g>
  <!-- Inter-ring connections (dashed) -->
  <g stroke="currentColor" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.25">
    <line x1="64" y1="50" x2="78" y2="50"/><line x1="50" y1="64" x2="50" y2="77.3"/>
    <line x1="36" y1="50" x2="22" y2="50"/><line x1="50" y1="36" x2="50" y2="22.7"/>
  </g>
</svg>
