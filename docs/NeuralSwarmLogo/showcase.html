<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralSwarm — Logo Design Exploration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #FAFAFA;
            color: #1A1A1A;
            overflow-x: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }

        /* Subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Logo hover effects */
        .logo-card {
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-card:hover {
            transform: translateY(-4px);
        }

        .logo-canvas {
            position: relative;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            color: #0066FF; /* Cold tone blue */
        }
        
        /* Apply dynamic color changing strictly to icon */
        .logo-card:hover .logo-canvas {
            color: #00E5FF;
        }

        /* Aura effect on hover */
        .logo-aura {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,229,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
            transform: scale(0.5);
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            filter: blur(40px);
            pointer-events: none;
        }

        .logo-card:hover .logo-aura {
            transform: scale(1);
            opacity: 1;
        }

        /* Divider animation */
        .divider-line {
            width: 0;
            height: 1px;
            background: #1A1A1A;
            opacity: 0.2;
            transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-card:hover .divider-line {
            width: 100%;
        }

        /* Showcase image effects */
        .showcase-img {
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            border-radius: 8px;
            overflow: hidden;
        }

        .showcase-img:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        /* Typography refinements */
        .tracking-ultra-wide {
            letter-spacing: 0.2em;
        }

        .text-balance {
            text-wrap: balance;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const ConcentricSwarm = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <g fill="currentColor">
                    <circle cx="50" cy="50" r="16"/>
                    <circle cx="50" cy="22" r="4.5"/>
                    <circle cx="74.2" cy="36" r="4"/>
                    <circle cx="74.2" cy="64" r="3.5"/>
                    <circle cx="50" cy="78" r="5"/>
                    <circle cx="25.8" cy="64" r="3.5"/>
                    <circle cx="25.8" cy="36" r="4"/>
                    <path d="M50 34V26.5 M62.1 43L69.8 38.6 M62.1 57L69.8 61.4 M50 66V73.5 M37.9 57L30.2 61.4 M37.9 43L30.2 38.6" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
                </g>
            </svg>
        );

        const HexHive = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" fill="none" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="50 15, 80 32.5, 80 67.5, 50 85, 20 67.5, 20 32.5"/>
                <path d="M50 85 V50 M20 32.5 L50 50 M80 32.5 L50 50"/>
                <circle cx="50" cy="50" r="8" fill="#FAFAFA" stroke="currentColor"/>
                <circle cx="50" cy="50" r="3" fill="currentColor" stroke="none"/>
            </svg>
        );

        const FluidNodes = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M40 30 Q60 10 70 30 T50 70 Q30 90 20 70 T40 30" stroke="currentColor" strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="40" cy="30" r="6"/>
                <circle cx="70" cy="30" r="5"/>
                <circle cx="50" cy="70" r="7"/>
                <circle cx="20" cy="70" r="4"/>
            </svg>
        );

        const SwarmWave = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <rect x="20" y="30" width="30" height="12" rx="6" />
                <rect x="60" y="30" width="20" height="12" rx="6" />
                <rect x="30" y="50" width="40" height="12" rx="6" />
                <rect x="80" y="50" width="10" height="12" rx="6" />
                <rect x="15" y="70" width="20" height="12" rx="6" />
                <rect x="45" y="70" width="35" height="12" rx="6" />
            </svg>
        );

        const NeuralSpark = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <g stroke="currentColor" strokeWidth="4" strokeLinecap="round" fill="none">
                    <line x1="50" y1="20" x2="50" y2="10" />
                    <line x1="50" y1="80" x2="50" y2="90" />
                    <line x1="20" y1="50" x2="10" y2="50" />
                    <line x1="80" y1="50" x2="90" y2="50" />
                    <line x1="28.8" y1="28.8" x2="21.7" y2="21.7" />
                    <line x1="71.2" y1="71.2" x2="78.3" y2="78.3" />
                    <line x1="28.8" y1="71.2" x2="21.7" y2="78.3" />
                    <line x1="71.2" y1="28.8" x2="78.3" y2="21.7" />
                    <circle cx="50" cy="50" r="16" fill="currentColor" stroke="none" />
                </g>
                <circle cx="50" cy="50" r="6" fill="#FAFAFA" />
            </svg>
        );

        const InfinitySwarm = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" fill="none" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M 35 50 C 20 50, 20 70, 35 70 C 65 70, 65 30, 85 30"/>
                <path d="M 15 70 C 35 70, 35 30, 65 30 C 80 30, 80 50, 65 50"/>
                <circle cx="85" cy="30" r="5" fill="currentColor" stroke="none"/>
                <circle cx="15" cy="70" r="4" fill="currentColor" stroke="none"/>
            </svg>
        );


        const LogoShowcase = () => {
            const logos = [
                {
                    title: "Concentric Core",
                    subtitle: "Swarm Emittance",
                    philosophy: "Representing a central neural entity orchestrating a swarm of connected nodes. Friendly rounded elements and precise geometry.",
                    Component: ConcentricSwarm
                },
                {
                    title: "Hex Hive",
                    subtitle: "Structural Network",
                    philosophy: "The hexagon represents a hive, while the internal intersecting lines form a neural web. A central core emphasizes control.",
                    Component: HexHive
                },
                {
                    title: "Fluid Nodes",
                    subtitle: "Organic Connection",
                    philosophy: "Uses soft, flowing paths to mimic natural neural pathways. It feels friendly, approachable, and highly dynamic.",
                    Component: FluidNodes
                },
                {
                    title: "Swarm Wave",
                    subtitle: "Collective Direction",
                    philosophy: "Capsule logic represents individual entities moving as a continuous wave, visualizing the 'swarm' concept flawlessly.",
                    Component: SwarmWave
                },
                {
                    title: "Neural Spark",
                    subtitle: "Intelligence Burst",
                    philosophy: "A central dense node processing information with a radial burst, signifying high energy and rapid decision-making.",
                    Component: NeuralSpark
                },
                {
                    title: "Infinity Flow",
                    subtitle: "Continuous Processing",
                    philosophy: "An continuous loop emphasizing endless learning and data flow across distributed systems.",
                    Component: InfinitySwarm
                }
            ];

            return (
                <div className="min-h-screen flex flex-col items-center py-20 px-6">

                    {/* Header */}
                    <div className="text-center mb-20 max-w-3xl">
                        <h1 className="text-6xl md:text-7xl font-extralight tracking-wider mb-6">
                            NeuralSwarm
                        </h1>
                        <p className="font-mono text-xs opacity-70 uppercase tracking-ultra-wide mb-8 text-blue-600">
                            Neural Networks Meets Swarm Intelligence
                        </p>
                        <div className="w-12 h-[1px] bg-[#1A1A1A] mx-auto opacity-30"></div>
                    </div>

                    {/* Logo Grid */}
                    <div className="max-w-7xl w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16 mb-32">
                        {logos.map((logo, index) => (
                            <div key={index} className="flex flex-col items-center logo-card cursor-pointer">

                                {/* Logo Canvas */}
                                <div className="w-64 h-64 mb-10 flex items-center justify-center relative">
                                    <div className="logo-aura"></div>
                                    <div className="w-32 h-32 relative z-10 logo-canvas">
                                        <logo.Component />
                                    </div>
                                </div>

                                {/* Text Description */}
                                <div className="text-center w-full px-4">
                                    <h2 className="text-xl font-medium tracking-wider mb-2 uppercase">
                                        {logo.title}
                                    </h2>
                                    <h3 className="text-xs font-mono opacity-50 tracking-widest mb-6">
                                        {logo.subtitle}
                                    </h3>
                                    <p className="text-sm leading-relaxed opacity-70 text-left font-light text-balance">
                                        {logo.philosophy}
                                    </p>
                                </div>

                                {/* Bottom Divider */}
                                <div className="divider-line mt-8 mx-auto"></div>
                            </div>
                        ))}
                    </div>

                    {/* Footer */}
                    <div className="mt-32 max-w-2xl text-center">
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide leading-loose">
                            Generated with Logo Generator<br/>
                            2026
                        </p>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LogoShowcase />);
    </script>

</body>
</html>
